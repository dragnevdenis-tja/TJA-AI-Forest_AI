version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./datasets:/app/datasets
      - ./experiments:/app/experiments
      - ./audio_samples:/app/audio_samples
    environment:
      - PYTHONPATH=.
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000/ws/live
    depends_on:
      - api
    restart: always
